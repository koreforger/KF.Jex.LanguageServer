name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore KF.Jex.LanguageServer.slnx

      - name: Build
        run: dotnet build KF.Jex.LanguageServer.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test KF.Jex.LanguageServer.slnx --configuration Release --no-build --verbosity normal
