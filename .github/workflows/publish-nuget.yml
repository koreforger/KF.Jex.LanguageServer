name: Publish to NuGet (Trusted Publishing)

on:
  push:
    tags:
      - 'KoreForge.Jex.LanguageServer/v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore KoreForge.Jex.LanguageServer.slnx

      - name: Build
        run: dotnet build KoreForge.Jex.LanguageServer.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test KoreForge.Jex.LanguageServer.slnx --configuration Release --no-build

      - name: Pack
        run: |
          TAG_NAME="${GITHUB_REF_NAME#KoreForge.Jex.LanguageServer/}"
          VERSION="${TAG_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$TAG_NAME" ]]; then
            echo "Unable to parse package version from tag '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          dotnet pack src/KoreForge.Jex.LanguageServer/KoreForge.Jex.LanguageServer.csproj \
            --configuration Release \
            --no-build \
            -p:PackageVersion=$VERSION \
            -o ./artifacts

      - name: Push package to nuget.org
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true
